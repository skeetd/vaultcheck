<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VaultCheck — Admin sign-in</title>
<style>
  :root{
    --bg:#eef1f4;--card:#fff;--border:#dce1e7;--text:#1f2933;--soft:#67727e;--accent:#1f2933;--crit:#b3261e;--crit-bg:#fdeae8;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:30px 32px;width:360px;box-shadow:0 1px 3px rgba(16,24,40,.06)}
  .brand{font-size:20px;font-weight:700;letter-spacing:-.3px}
  .brand .vc{color:#3b5bdb}
  .sub{color:var(--soft);font-size:13px;margin:4px 0 22px}
  label{display:block;font-size:12px;font-weight:600;color:var(--soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text)}
  input:focus{outline:none;border-color:#9aa5b1}
  button{width:100%;margin-top:16px;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  button:hover{background:#0f1720}
  .error{background:var(--crit-bg);border:1px solid #f1b0a8;color:var(--crit);border-radius:8px;padding:9px 12px;margin-bottom:16px;font-size:13px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="vc">Vault</span>Check</div>
    <div class="sub">Admin sign-in</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Password</label>
      <input type="password" name="password" autofocus>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
