<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}VaultCheck{% endblock %}</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#fff; --border:#e7e9ee; --text:#181b22; --soft:#5f6877; --muted:#949bab;
    --accent:#5b4af5; --accent-2:#7b6cff; --accent-soft:#eeebff;
    --sidebar:#13151d; --side-text:#9aa2b1; --side-hover:#1e2130;
    --crit:#c01c28; --crit-bg:#fdecee; --high:#b35309; --high-bg:#fcefe0;
    --med:#846a00; --med-bg:#fbf4d6; --low:#5a6772; --low-bg:#eceff2;
    --green:#1f7a44; --green-bg:#e7f6ec;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono","Cascadia Code","JetBrains Mono",Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:flex;min-height:100vh}

  /* Sidebar */
  .sidebar{width:230px;flex-shrink:0;background:var(--sidebar);color:var(--side-text);
           display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:20px 20px 16px;color:#fff;font-weight:700;font-size:16px;letter-spacing:-.2px}
  .brand:hover{text-decoration:none}
  .nav{display:flex;flex-direction:column;gap:2px;padding:6px 12px}
  .nav .group{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#5b6273;padding:14px 12px 6px}
  .nav a{display:flex;align-items:center;gap:11px;color:var(--side-text);padding:9px 12px;border-radius:8px;font-size:14px;font-weight:500;line-height:1}
  .nav a:hover{background:var(--side-hover);color:#fff;text-decoration:none}
  .nav a.active{background:var(--accent);color:#fff}
  .nav a svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
  .nav a.active svg{opacity:1}
  .side-foot{margin-top:auto;padding:14px 16px;border-top:1px solid #20232f;font-size:13px}
  .side-foot a{color:var(--side-text)}
  .side-foot a:hover{color:#fff}

  /* Main */
  .main{flex:1;min-width:0}
  .container{max-width:1040px;margin:0 auto;padding:34px 32px 72px}
  .container.narrow{max-width:780px}

  h1{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
  .lead{color:var(--soft);font-size:13.5px;margin-bottom:24px;max-width:760px}
  h2{font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--soft);margin:30px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:0 1px 2px rgba(20,24,33,.04)}

  label{display:block;font-size:12px;font-weight:600;color:var(--soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:13.5px;color:var(--text);background:#fff;font-family:var(--sans);margin-bottom:14px}
  input.mono,textarea{font-family:var(--mono)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .btn{display:inline-block;padding:9px 15px;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:13.5px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .btn:hover{background:#f6f7f9;text-decoration:none}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:#4a3bdb}
  .btn-danger{border-color:#f0bcc0;color:var(--crit);background:#fff}
  .btn-danger:hover{background:var(--crit-bg)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  thead th{text-align:left;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--soft);background:#fafbfc;padding:11px 15px;border-bottom:1px solid var(--border);white-space:nowrap}
  tbody td{padding:12px 15px;border-bottom:1px solid #f0f1f4;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafbfd}
  td.mono{font-family:var(--mono);font-size:12px;overflow-wrap:anywhere}

  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap}
  .sev-critical{color:var(--crit);background:var(--crit-bg)}
  .sev-high{color:var(--high);background:var(--high-bg)}
  .sev-medium{color:var(--med);background:var(--med-bg)}
  .sev-low{color:var(--low);background:var(--low-bg)}
  .pill.pro{color:var(--accent);background:var(--accent-soft)}
  .pill.free{color:var(--soft);background:var(--low-bg)}

  .flash{padding:11px 15px;border-radius:10px;margin-bottom:14px;font-size:13px}
  .flash.ok{background:var(--green-bg);border:1px solid #bfe3cc;color:var(--green)}
  .flash.error{background:var(--crit-bg);border:1px solid #f0bcc0;color:var(--crit)}

  .empty{color:var(--soft);font-style:italic;padding:18px 0}
  .note,.warn{color:var(--soft);font-size:12px}

  .stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px}
  .stat{flex:1;min-width:130px;border:1px solid var(--border);border-radius:12px;padding:16px 18px;background:var(--card)}
  .stat .n{font-size:27px;font-weight:700;line-height:1;letter-spacing:-.5px}
  .stat .l{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;margin-top:5px}

  @media (max-width:760px){
    .app{flex-direction:column}
    .sidebar{width:100%;height:auto;position:static;flex-direction:row;align-items:center;overflow-x:auto}
    .brand{padding:14px 16px}
    .nav{flex-direction:row;padding:8px}.nav .group{display:none}.side-foot{margin:0;border:none}
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <a class="brand" href="/">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.5l7.5 2.8v5.6c0 4.7-3.2 8-7.5 9.4-4.3-1.4-7.5-4.7-7.5-9.4V5.3L12 2.5z" fill="var(--accent)"/>
        <path d="M8.6 12.1l2.3 2.3 4.5-4.6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      VaultCheck
    </a>
    <nav class="nav">
      <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
      <div class="group">Scan</div>
      <a href="/scan" {% if request.path == '/scan' %}class="active"{% endif %}>Repository</a>
      <a href="/check" {% if request.path == '/check' %}class="active"{% endif %}>Checks</a>
      <a href="/history" {% if request.path == '/history' %}class="active"{% endif %}>History</a>
      <div class="group">Monitor</div>
      <a href="/disclosure" {% if request.path == '/disclosure' %}class="active"{% endif %}>Public repos</a>
    </nav>
    <div class="side-foot"><a href="/logout">Log out</a></div>
  </aside>
  <main class="main">
    <div class="container {% block wrapclass %}{% endblock %}">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
